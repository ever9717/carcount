name = "xinglian-traffic-monitor"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 命名空间绑定（用于限流和日志）
[[kv_namespaces]]
binding = "TRAFFIC_KV"
id = "your_kv_namespace_id"  # 替换为你的 KV namespace ID

# 环境变量（在 Cloudflare Dashboard 设置）
[vars]
MODE = "simulated"
LOG_USAGE = "true"

# 限流配置
LIMIT_PER_MINUTE = "10"
LIMIT_PER_HOUR = "100"
LIMIT_PER_DAY = "1000"

# Secrets（使用 wrangler secret put 设置）
# GAODE_API_KEY - 高德地图 API Key
# API_KEYS - 允许的 API Keys（逗号分隔，如：key1,key2,key3）
